name: Publish (crates.io + npm)

# Manual re-runnable publisher: pushes the already-released binaries to
# crates.io (`cargo install`) + npm (`npx`) without re-building the DMG.
# Idempotent — tolerates crates/packages already at this version — so it's safe
# to re-run after fixing a token. No-op for a registry whose secret isn't set.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose prebuilt binaries to package for npm"
        required: true
        default: "v0.6.0"
      registry:
        description: "Which registry to publish to"
        type: choice
        default: both
        options: [both, crates, npm]

permissions:
  contents: read

jobs:
  crates:
    if: ${{ inputs.registry != 'npm' }}
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Publish core then bin (single attempt, idempotent)
        if: env.CARGO_REGISTRY_TOKEN != ''
        shell: bash
        run: |
          set -uo pipefail
          set +e  # GitHub injects `bash -e`; keep tolerated "already published" non-fatal.
          # 0 = published, 2 = already at this version (tolerate), 1 = other.
          publish_crate() {
            local out
            if out="$(cargo publish -p "$1" 2>&1)"; then echo "$out"; return 0; fi
            echo "$out"
            if echo "$out" | grep -qiE 'already (exists|uploaded|published)|crate version .* is already'; then
              return 2
            fi
            return 1
          }
          publish_crate context-bar-core; rc=$?
          if [[ $rc -eq 1 ]]; then echo "::error::core publish failed"; exit 1; fi
          # ONE attempt only. crates.io's new-crate rate limit ADVANCES its
          # window on each attempt, so retry-hammering keeps it perpetually
          # blocked. If this 429s, wait quietly (no dispatches) until past the
          # reported reset, then dispatch once more.
          publish_crate context-bar; rc=$?
          case $rc in
            0) echo "bin published" ;;
            2) echo "bin already published" ;;
            *) echo "::error::bin publish failed — likely the crates.io new-crate rate limit. Wait past the reported reset (do NOT re-run repeatedly), then dispatch registry=crates once."; exit 1 ;;
          esac

  npm:
    if: ${{ inputs.registry != 'crates' }}
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Assemble + publish npm packages
        if: env.NODE_AUTH_TOKEN != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p archives bins
          gh release download "$TAG" -R "$REPO" \
            -p 'context-bar-*.tar.gz' -p 'context-bar-*.zip' -D archives
          for triple in aarch64-apple-darwin x86_64-apple-darwin \
                        aarch64-unknown-linux-musl x86_64-unknown-linux-musl \
                        aarch64-pc-windows-msvc x86_64-pc-windows-msvc; do
            mkdir -p "bins/$triple"
            if [[ -f "archives/context-bar-$triple.tar.gz" ]]; then
              tar -xzf "archives/context-bar-$triple.tar.gz" -C "bins/$triple"
            elif [[ -f "archives/context-bar-$triple.zip" ]]; then
              unzip -o "archives/context-bar-$triple.zip" -d "bins/$triple"
            fi
          done
          VERSION="$VERSION" BIN_DIR="$PWD/bins" bash scripts/npm-publish.sh
