name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_TYPE" == "tag" ]]; then
            VERSION="${REF_NAME#v}"
            TAG_NAME="$REF_NAME"
          else
            VERSION="$(sed -n 's/^version = \"\(.*\)\"/\1/p' Cargo.toml | head -n1)"
            TAG_NAME="v${VERSION}"
          fi
          if ! [[ "$VERSION" =~ ^[A-Za-z0-9._+-]+$ ]]; then
            echo "Refusing unsafe version string: $VERSION" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Sync app bundle version
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" packaging/macos/ContextBar-Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" packaging/macos/ContextBar-Info.plist

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE_P12_BASE64 != ''
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          P12_PATH="$RUNNER_TEMP/certificate.p12"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend the release keychain to the search list so codesign sees the identity.
          OTHER_KEYCHAINS="$(security list-keychains -d user | sed -e 's/^[[:space:]]*//' -e 's/"//g')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $OTHER_KEYCHAINS

          rm -f "$P12_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Store notarization credentials
        if: env.MACOS_NOTARY_API_KEY_BASE64 != ''
        shell: bash
        env:
          MACOS_NOTARY_API_KEY_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_BASE64 }}
          MACOS_NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
          MACOS_NOTARY_API_ISSUER: ${{ secrets.MACOS_NOTARY_API_ISSUER }}
        run: |
          set -euo pipefail
          P8_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$MACOS_NOTARY_API_KEY_BASE64" | base64 --decode > "$P8_PATH"
          xcrun notarytool store-credentials contextbar-notary \
            --key "$P8_PATH" \
            --key-id "$MACOS_NOTARY_API_KEY_ID" \
            --issuer "$MACOS_NOTARY_API_ISSUER"
          rm -f "$P8_PATH"

      - name: Build DMG
        shell: bash
        run: scripts/create-macos-dmg.sh

      - name: Generate checksums
        shell: bash
        run: shasum -a 256 dist/ContextBar.dmg > dist/ContextBar.dmg.sha256

      - name: Prepare release notes
        id: notes
        shell: bash
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          NOTES_PATH="docs/releases/${TAG_NAME}.md"
          if [[ -f "$NOTES_PATH" ]]; then
            echo "body_path=$NOTES_PATH" >> "$GITHUB_OUTPUT"
          else
            echo "body_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          generate_release_notes: ${{ steps.notes.outputs.body_path == '' }}
          body_path: ${{ steps.notes.outputs.body_path }}
          draft: false
          prerelease: false
          files: |
            dist/ContextBar.dmg
            dist/ContextBar.dmg.sha256

      - name: Update Homebrew Cask (in-repo)
        if: github.ref_type == 'tag'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SHA=$(awk '{print $1}' dist/ContextBar.dmg.sha256)
          CASK=Casks/context-bar.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          sed -i.bak -E "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"
          sed -i.bak -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" "$CASK"
          rm -f "$CASK.bak"
          git add "$CASK"
          if git diff --cached --quiet; then
            echo "In-repo cask already up-to-date."
          else
            git commit -m "chore(cask): bump to v${VERSION}"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" HEAD:main
          fi

      - name: Sync Homebrew tap repo
        if: github.ref_type == 'tag' && env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || 'htahaozlu/homebrew-context-bar' }}
        run: |
          set -euo pipefail
          if ! [[ "$HOMEBREW_TAP_REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Refusing unsafe Homebrew tap repository: $HOMEBREW_TAP_REPOSITORY" >&2
            exit 1
          fi
          SHA=$(awk '{print $1}' dist/ContextBar.dmg.sha256)
          WORK=$(mktemp -d)
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" "$WORK"
          cd "$WORK"
          if ! git push --dry-run origin HEAD:main >/tmp/homebrew-tap-push-check.log 2>&1; then
            echo "::error::HOMEBREW_TAP_TOKEN cannot push to ${HOMEBREW_TAP_REPOSITORY}. Give the token Contents read/write access to that repository, or set HOMEBREW_TAP_REPOSITORY to the correct tap repo." >&2
            sed -E 's#x-access-token:[^@]+@#x-access-token:***@#g' /tmp/homebrew-tap-push-check.log >&2
            exit 1
          fi
          mkdir -p Casks
          cp "$GITHUB_WORKSPACE/Casks/context-bar.rb" Casks/context-bar.rb
          sed -i.bak -E "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/context-bar.rb
          sed -i.bak -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/context-bar.rb
          rm -f Casks/context-bar.rb.bak
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/context-bar.rb
          if git diff --cached --quiet; then
            echo "Tap cask already up-to-date."
          else
            git commit -m "chore: bump context-bar to v${VERSION}"
            git push origin HEAD:main
          fi

      - name: Clean up release keychain
        if: always() && env.KEYCHAIN_PATH != ''
        shell: bash
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true

  # Cross-platform CLI binaries (since 0.5.0 the engine is pure-Rust — no
  # python3 sidecar — so musl Linux + Windows builds are fully functional).
  # Attaches archives to the same GitHub release created above.
  upload-binaries:
    needs: build-macos-release
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
          - { target: aarch64-pc-windows-msvc, os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - name: Build + upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: context-bar
          target: ${{ matrix.target }}
          archive: context-bar-$target
          include: LICENSE,README.md
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
